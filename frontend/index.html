<!doctype html>
<html lang="en">

<head>
  <script>
    window.addEventListener('error', function (e) {
      document.body.innerHTML += '<div style="color:red;z-index:9999;position:fixed;top:0;left:0;background:white;padding:20px;width:100%;font-size:16px;">Global Error: ' + (e.error ? e.error.stack : e.message) + '</div>';
    });
    window.addEventListener('unhandledrejection', function (e) {
      document.body.innerHTML += '<div style="color:red;z-index:9999;position:fixed;top:0;left:0;background:white;padding:20px;width:100%;font-size:16px;">Unhandled Promise: ' + (e.reason ? (e.reason.stack || e.reason) : e) + '</div>';
    });
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FriendConnect-Web_App</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
